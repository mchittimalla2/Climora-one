<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" role="img" aria-labelledby="title desc">
  <title id="title">Premium handcrafted Climoraone decor collection</title>
  <desc id="desc">A premium artisan display with a wooden elephant, decorative vase, traditional doll, lantern, bowl and wooden accent pieces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7ee"/>
      <stop offset="1" stop-color="#efe2cc"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c58a3b"/>
      <stop offset="1" stop-color="#6f3b1b"/>
